<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MovieLove</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f8;color:#222}
header,h2{background:#168dd1;color:white;text-align:center;padding:22px;margin:0}
.search{text-align:center;background:white;padding:20px}
input{width:80%;padding:13px;border:1px solid #ccc;border-radius:20px}
button{margin-top:10px;padding:10px 18px;background:#168dd1;color:white;border:0;border-radius:6px}
.movies{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:20px}
.card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px #bbb}
.poster{height:200px;background:#ddd;display:flex;align-items:center;justify-content:center}
.info{padding:14px}
a{background:#e53935;color:white;padding:9px;text-decoration:none;border-radius:5px;display:inline-block}
footer{background:#222;color:white;text-align:center;padding:18px}
</style>
</head>
<body>
<header>
<h1>MovieLove</h1>
<p>Movie news, reviews and official trailers</p>
</header>

<div class="search">
<input placeholder="Search movies...">
<br><button>Search Movie</button>
</div>

<h2>Latest Movies</h2>

<div class="movies">
<div class="card">
<div class="poster">Movie Poster</div>
<div class="info">
<h3>Movie Name 1</h3>
<p>Action | Tamil | 2026</p>
<a href="https://www.youtube.com/" target="_blank">Official Trailer</a>
</div>
</div>

<div class="card">
<div class="poster">Movie Poster</div>
<div class="info">
<h3>Movie Name 2</h3>
<p>Thriller | Tamil | 2026</p>
<a href="https://www.youtube.com/" target="_blank">Official Trailer</a>
</div>
</div>

<div class="card">
<div class="poster">Movie Poster</div>
<div class="info">
<h3>Movie Name 3</h3>
<p>Drama | Tamil | 2026</p>
<a href="https://www.youtube.com/" target="_blank">Official Trailer</a>
</div>
</div>
</div>

<footer>© 2026 MovieLove</footer>
</body>
</html>
